<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Battleship</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>⚓ Battleship</h1>
  <p id="message">Drag your ships onto your board!</p>

  <div id="game-container">

    <!-- Ship dock — shown during placement only -->
    <div id="ship-dock">
      <h3>Your Fleet</h3>
      <p id="placement-info"></p>
      <div id="ships-to-place">
        <!-- Ships injected by JS -->
      </div>
      <button id="random-place">🎲 Random</button>
      <button id="reset-place">↩️ Reset</button>
    </div>

    <!-- Boards -->
    <div id="boards">
      <div>
        <h2>Your Board</h2>
        <div id="human-board" class="board"></div>
      </div>
      <div id="enemy-section">
        <h2>Enemy Board</h2>
        <div id="computer-board" class="board"></div>
      </div>
    </div>

  </div>

  <script type="module" src="src/index.js"></script>
</body>
</html>
